        .btn-reset { background-color: #f44336; }
        .status-bar { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: none; color: #2e7d32; font-weight: bold; border: 1px solid #c8e6c9; }

    pharmacies.forEach(p => {
        L.marker([p.lat, p.lng], {icon: pharmacyIcon}).addTo(map).bindPopup(p.name);
    });

    var clientLat, clientLng, clientMarker;

    // وظيفة جديدة كلياً لقراءة الإحداثيات بعد علامة الـ #
    function readLocationFromUrl() {
        var hash = window.location.hash.substring(1); // تأخذ ما بعد الـ #
        if (hash) {
            var coords = hash.split(',');
            if (coords.length === 2) {
                var lat = parseFloat(coords[0]);
                var lng = parseFloat(coords[1]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    clientLat = lat; clientLng = lng;
                    document.getElementById('locationInput').value = hash;
                    document.getElementById('statusBar').style.display = 'block';
                    updateClientMarker(lat, lng);
                    // البحث التلقائي بعد ثانية
                    setTimeout(findNearest, 1000);
                }
            }
        }
    }

    window.onload = readLocationFromUrl;

    function updateClientMarker(lat, lng) {
        if (clientMarker) map.removeLayer(clientMarker);
        clientMarker = L.marker([lat, lng], { icon: clientIcon, draggable: true }).addTo(map).bindPopup("موقع العميل").openPopup();
        map.setView([lat, lng], 14);
    }

    function distance(lat1, lon1, lat2, lon2) {
        var R = 6371;
        var dLat = (lat2 - lat1) * Math.PI / 180;
        var dLon = (lon2 - lon1) * Math.PI / 180;
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findNearest() {
        var val = document.getElementById('locationInput').value;
        if (val.includes(',')) {
            var parts = val.split(',');
            clientLat = parseFloat(parts[0]);
            clientLng = parseFloat(parts[1]);
            updateClientMarker(clientLat, clientLng);
        }

        if (!clientLat) { alert("أدخل الإحداثيات أولاً"); return; }
        var nearest = null;
        var minDist = Infinity;
        pharmacies.forEach(p => {
            var d = distance(clientLat, clientLng, p.lat, p.lng);
            if (d < minDist) { minDist = d; nearest = p; }
        });
        
        map.flyTo([nearest.lat, nearest.lng], 15);
        setTimeout(() => {
            alert("أقرب صيدلية: " + nearest.name + "\nالمسافة: " + minDist.toFixed(2) + " كم");
        }, 800);
    }

    function resetAll() {
        if (clientMarker) map.removeLayer(clientMarker);
        clientLat = null; clientLng = null;
        document.getElementById('locationInput').value = "";
        document.getElementById('statusBar').style.display = 'none';
        window.location.hash = "";
        map.setView([24.7136, 46.6753], 6);
    }
