    pharmacies.forEach(p => {
        var marker = L.marker([p.lat, p.lng], {icon: pharmacyIcon})
         .addTo(map)
         .bindTooltip(p.name, {permanent: true, direction: 'top', offset: [0, -5]});

        marker.closeTooltip();
        pharmacyMarkers.push(marker);
    });

    // وظيفة التحكم في ظهور الأسماء بناءً على الزوم
    map.on('zoomend', function() {
        var currentZoom = map.getZoom();
        pharmacyMarkers.forEach(marker => {
            if (currentZoom >= 13) { // لو الزوم 13 أو أكتر (قريب) أظهر الأسماء
                marker.openTooltip();
            } else { // لو الزوم أقل (بعيد) اخفي الأسماء
                marker.closeTooltip();
            }
        });
    });

    function readLocationFromUrl() {
        var hash = window.location.hash.substring(1);
        if (hash) {
            var coords = hash.split(',');
            if (coords.length === 2) {
                var lat = parseFloat(coords[0]);
                var lng = parseFloat(coords[1]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    L.marker([lat, lng], { icon: clientIcon }).addTo(map).bindPopup("موقع العميل").openPopup();
                    map.setView([lat, lng], 13); // ده هيخلي الأسماء تظهر تلقائياً لأن الزوم = 13
                }
            }
        }
    }
    window.onload = readLocationFromUrl;
